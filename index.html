<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پیوند مودّت | سامانه ثبت اطلاعات همسرگزینی</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    background:#eef4ff;
}
.top-buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
    flex-wrap:wrap;
}
.top-buttons button{
    flex:1;
}
.user-card{
    background:#fff;
    border-radius:15px;
    padding:15px;
    margin:10px 0;
    border:1px solid #dbeafe;
}
.section-title{
    background:#2563eb;
    color:white;
    padding:10px;
    border-radius:10px;
    margin:20px 0 15px;
}
</style>

</head>
<body>

<div class="form-container">

<div class="form-header">
<h1>🌿 پیوند مودّت</h1>
<p>سامانه ثبت اطلاعات همسرگزینی</p>
</div>

<form id="userInfoForm" class="register-form">

<h3 class="section-title">اطلاعات فردی</h3>

<div class="field-group">
<label>جنسیت *</label>
<select id="gender" required>
<option value="">انتخاب کنید</option>
<option value="مرد">مرد</option>
<option value="زن">زن</option>
</select>
</div>

<div class="row-2col">

<div class="field-group">
<label>نام *</label>
<input type="text"
id="firstName"
placeholder="مثال: رضا"
required>
</div>

<div class="field-group">
<label>نام خانوادگی *</label>
<input type="text"
id="lastName"
placeholder="مثال: کریمی"
required>
</div>

</div>

<h3 class="section-title">تاریخ تولد شمسی</h3>

<div class="row-2col">

<div class="field-group">
<label>سال تولد</label>
<input type="number"
id="birthYear"
placeholder="مثال: 1378">
</div>

<div class="field-group">
<label>ماه تولد</label>
<input type="number"
id="birthMonth"
min="1"
max="12"
placeholder="1 تا 12">
</div>

</div>

<div class="field-group">
<label>روز تولد</label>
<input type="number"
id="birthDay"
min="1"
max="31"
placeholder="1 تا 31">
</div>

<h3 class="section-title">مشخصات ظاهری</h3>

<div class="row-2col">

<div class="field-group">
<label>قد (سانتی متر)</label>
<input type="number"
id="height"
placeholder="مثال: 175">
</div>

<div class="field-group">
<label>وزن (کیلوگرم)</label>
<input type="number"
id="weight"
placeholder="مثال: 75">
</div>

</div>

<div class="row-2col">

<div class="field-group">
<label>رنگ پوست</label>
<select id="skinColor">
<option>سفید</option>
<option>گندمی روشن</option>
<option>گندمی</option>
<option>سبزه</option>
<option>تیره</option>
</select>
</div>

<div class="field-group">
<label>رنگ چشم</label>
<select id="eyeColor">
<option>مشکی</option>
<option>قهوه‌ای</option>
<option>عسلی</option>
<option>سبز</option>
<option>آبی</option>
<option>طوسی</option>
</select>
</div>

</div>

<div class="field-group">
<label>نوع پوشش</label>
<select id="dressType">
<option>چادر</option>
<option>مانتو</option>
<option>رسمی</option>
<option>معمولی</option>
<option>سنتی</option>
<option>سایر</option>
</select>
</div>

<h3 class="section-title">خانواده</h3>

<div class="row-2col">

<div class="field-group">
<label>شغل پدر</label>
<input type="text"
id="fatherJob"
placeholder="مثال: کارمند">
</div>

<div class="field-group">
<label>شغل مادر</label>
<input type="text"
id="motherJob"
placeholder="مثال: خانه‌دار">
</div>

</div>

<div class="row-2col">

<div class="field-group">
<label>تعداد افراد خانواده</label>
<input type="number"
id="familyCount"
placeholder="مثال: 5">
</div>

<div class="field-group">
<label>فرزند چندم هستید</label>
<input type="number"
id="childOrder"
placeholder="مثال: 2">
</div>

</div>
<h3 class="section-title">محل سکونت</h3>

<div class="field-group">
<label>استان محل سکونت</label>
<input type="text" id="province" placeholder="مثال: قم">
</div>

<div class="field-group">
<label>شهرستان</label>
<input type="text" id="county" placeholder="مثال: قم">
</div>

<div class="field-group">
<label>روستا / محله</label>
<input type="text" id="village" placeholder="مثال: پردیسان">
</div>

<h3 class="section-title">شغل و تحصیلات</h3>

<div class="field-group">
<label>نوع شغل</label>
<select id="jobType">
<option value="">انتخاب کنید</option>
<option value="کارمند دولتی">کارمند دولتی</option>
<option value="کارمند خصوصی">کارمند خصوصی</option>
<option value="آزاد">آزاد</option>
</select>
</div>

<div class="field-group">
<label>شرح شغل خود را بنویسید</label>
<textarea id="jobDescription" rows="3"
placeholder="مثال: معلم، برنامه نویس، فروشنده و ..."></textarea>
</div>

<div class="field-group">
<label>وضعیت تحصیل خودتان</label>
<select id="educationLevel">
<option>زیر دیپلم</option>
<option>دیپلم</option>
<option>فوق دیپلم</option>
<option>کارشناسی</option>
<option>کارشناسی ارشد</option>
<option>دکتری</option>
<option>حوزوی</option>
</select>
</div>

<div class="field-group">
<label>میزان درآمد ماهیانه (تومان)</label>
<input type="text"
id="monthlyIncome"
placeholder="مثال: 15000000">
</div>

<div class="field-group">
<label>وضعیت دارایی (خانه و ماشین)</label>
<textarea id="assets" rows="2"
placeholder="مثال: خانه شخصی و خودرو"></textarea>
</div>

<h3 class="section-title">وضعیت فردی</h3>

<div class="field-group">
<label>وضعیت جسمی</label>
<select id="physicalStatus">
<option>سالم</option>
<option>معلول</option>
</select>
</div>

<div class="field-group">
<label>اهل دخانیات هستید؟</label>
<select id="smoking">
<option>خیر</option>
<option>بله سیگار</option>
<option>بله قلیان</option>
<option>بله هردو</option>
</select>
</div>

<div class="field-group">
<label>سابقه ازدواج</label>
<select id="marriageStatus">
<option>مجرد و بدون سابقه ازدواج</option>
<option>مطلقه در دوران نامزدی جدا شدم</option>
<option>مطلقه بدون فرزند هستم</option>
<option>مطلقه دارای فرزند هستم</option>
<option>مطلقه همسر قبلی در قید حیات هستند</option>
<option>همسر فوت شده</option>
</select>
</div>

<h3 class="section-title">راه های ارتباطی</h3>

<div class="row-2col">

<div class="field-group">
<label>شماره تماس 1</label>
<input type="tel"
id="phone1"
maxlength="11"
placeholder="09123456789">
</div>

<div class="field-group">
<label>شماره تماس 2</label>
<input type="tel"
id="phone2"
maxlength="11"
placeholder="09123456789">
</div>

</div>

<div class="field-group">
<label>آیدی ایتا</label>
<input type="text" id="eitaaId">
</div>

<div class="field-group">
<label>آیدی روبیکا</label>
<input type="text" id="rubikaId">
</div>

<div class="field-group">
<label>آیدی بله</label>
<input type="text" id="baleId">
</div>

<div class="field-group">
<label>آیدی سروش</label>
<input type="text" id="soroushId">
</div>

<div class="field-group">
<label>نحوه ارتباط با شما</label>
<select id="contactMethod">
<option>تماس تلفنی</option>
<option>پیامک</option>
<option>ایتا</option>
<option>روبیکا</option>
<option>بله</option>
<option>سروش</option>
</select>
</div>

<h3 class="section-title">ویژگی ها و معیارها</h3>

<div class="field-group">
<label>خصوصیات اخلاقی</label>
<textarea id="personality" rows="3"
placeholder="مثال: صبور، آرام، مسئولیت پذیر، خوش اخلاق"></textarea>
</div>

<div class="field-group">
<label>معیار همسر آینده</label>
<textarea id="spouseCriteria" rows="3"
placeholder="مثال: متدین، خوش اخلاق، مسئولیت پذیر، خانواده دوست"></textarea>
</div>

<div class="field-group">
<label>از کدام استان ها می پذیرید؟</label>
<textarea id="acceptedProvinces" rows="2"></textarea>
</div>

<div class="field-group">
<label>با کدام صاحبان مشاغل ازدواج می کنید؟</label>
<select id="acceptedJobs">
<option>محدودیتی ندارم</option>
<option>فقط روحانی</option>
<option>فقط نظامی</option>
<option>فقط کارمند</option>
<option>فقط شغل آزاد</option>
</select>
</div>
<div class="field-group">
<label>اختلاف سنی مطلوب</label>
<select id="ageDifference">
<option>همسن می پذیرم</option>
<option>اختلاف سنی 2 تا 5 سال</option>
<option>اختلاف سنی 6 تا 10 سال</option>
<option>بزرگتر می پذیرم</option>
</select>
</div>

<div class="field-group">
<label>حداقل تحصیلات همسر آینده</label>
<select id="minSpouseEducation">
<option>دیپلم</option>
<option>فوق دیپلم</option>
<option>کارشناسی</option>
<option>کارشناسی ارشد</option>
<option>دکتری</option>
<option>حوزوی</option>
</select>
</div>

<div class="field-group">
<label>توضیحات تکمیلی</label>
<textarea id="description" rows="4"></textarea>
</div>

<div class="top-buttons">

<button type="submit" class="btn-submit">
✓ ثبت اطلاعات در پیوند مودّت
</button>

<button type="button"
id="viewUsersBtn"
class="btn-submit">
👥 مشاهده کاربران
</button>

<button type="button"
id="adminLoginBtn"
class="btn-submit">
🔐 ورود ادمین
</button>

</div>

<div id="formMessage"></div>

<div id="usersListContainer" style="display:none;">
<h3 class="section-title">کاربران ثبت شده</h3>
<div id="usersList"></div>
</div>

<footer style="margin-top:30px;text-align:center;">

جهت اطلاع از اخبار و برنامه ها در کانال ایتا پیوند مودّت بپیوندید

target="_blank">

</a>

</footer>

</form>

<script src="./script.js"></script>

</body>
</html>
